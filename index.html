<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <title>X & Minas — Multiplayer PWA</title>
    <script>
      (() => {
        try {
          const t = localStorage.getItem("x-minas-theme");
          const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = t === "light" || t === "dark" ? t : prefersDark ? "dark" : "light";
          document.documentElement.classList.remove("theme-dark", "theme-light");
          document.documentElement.classList.add(theme === "dark" ? "theme-dark" : "theme-light");
        } catch {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.svg" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logo">X</div>
        <div>
          <div class="title">X & Minas</div>
          <div class="subtitle">PWA • Offline • LAN • Online</div>
        </div>
      </div>
      <div class="top-actions">
        <button id="btnTheme" class="btn btn-secondary" type="button">Tema</button>
        <button id="btnInstall" class="btn btn-secondary" hidden>Instalar</button>
      </div>
    </header>

    <main id="app" class="app"></main>

    <footer class="footer">
      <span>Objetivo: encontrar o <b>X</b> em cada linha até a linha 10.</span>
    </footer>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
